<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)" rx="20"/>
  <circle cx="200" cy="120" r="60" fill="rgba(255,255,255,0.2)" filter="url(#blur2)"/>
  <circle cx="200" cy="120" r="40" fill="rgba(255,255,255,0.3)"/>
  <text x="200" y="200" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="600">Voice Cloning</text>
  <text x="200" y="225" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="12">Your Voice, AI Enhanced</text>
  <!-- Sound waves -->
  <ellipse cx="200" cy="120" rx="50" ry="20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <ellipse cx="200" cy="120" rx="65" ry="28" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <ellipse cx="200" cy="120" rx="80" ry="36" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Microphone icon -->
  <rect x="190" y="105" width="20" height="30" rx="10" fill="rgba(255,255,255,0.6)"/>
  <path d="M 185 120 Q 185 135 200 135 Q 215 135 215 120" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
</svg>