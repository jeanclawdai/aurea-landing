<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="skin4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE5CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2D7B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hair4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4BC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8D8A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scrubs4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE5F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCCE5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bg4" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFF0F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4E1;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg4)"/>
  
  <!-- Pink medical scrubs -->
  <path d="M85 185 Q85 170 100 160 L200 160 Q215 170 215 185 L215 400 L85 400 Z" fill="url(#scrubs4)" stroke="#FF9FD1" stroke-width="2"/>
  
  <!-- Neck -->
  <ellipse cx="150" cy="180" rx="18" ry="10" fill="url(#skin4)"/>
  
  <!-- Face -->
  <ellipse cx="150" cy="130" rx="40" ry="48" fill="url(#skin4)"/>
  
  <!-- Blonde hair (styled) -->
  <path d="M110 115 Q110 75 150 70 Q190 75 190 115 Q190 105 185 100 Q175 95 150 95 Q125 95 115 100 Q110 105 110 115 Z" fill="url(#hair4)"/>
  <path d="M110 115 Q105 120 108 125 Q115 130 125 125" fill="url(#hair4)"/>
  <path d="M190 115 Q195 120 192 125 Q185 130 175 125" fill="url(#hair4)"/>
  
  <!-- Eyes (bright and friendly) -->
  <ellipse cx="138" cy="125" rx="7" ry="5" fill="white"/>
  <ellipse cx="162" cy="125" rx="7" ry="5" fill="white"/>
  <circle cx="138" cy="125" r="3.5" fill="#4FC3F7"/>
  <circle cx="162" cy="125" r="3.5" fill="#4FC3F7"/>
  <circle cx="139" cy="123" r="1.5" fill="black"/>
  <circle cx="163" cy="123" r="1.5" fill="black"/>
  <circle cx="140" cy="122" r="0.8" fill="white"/>
  <circle cx="164" cy="122" r="0.8" fill="white"/>
  
  <!-- Long eyelashes -->
  <path d="M131 120 L133 118 M135 119 L137 117 M141 119 L143 117 M145 120 L147 118" stroke="#D4C094" stroke-width="1"/>
  <path d="M153 118 L155 120 M157 117 L159 119 M161 117 L163 119 M165 118 L167 120" stroke="#D4C094" stroke-width="1"/>
  
  <!-- Eyebrows (shaped) -->
  <path d="M131 118 Q138 116 145 118" stroke="#D4C094" stroke-width="2" fill="none"/>
  <path d="M155 118 Q162 116 169 118" stroke="#D4C094" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <path d="M148 130 Q150 140 152 145" stroke="#E6C7A8" stroke-width="2" fill="none"/>
  
  <!-- Lips (glossy) -->
  <ellipse cx="150" cy="150" rx="10" ry="5" fill="#FF9BB5"/>
  <ellipse cx="150" cy="149" rx="8" ry="3" fill="#FFB3C6"/>
  
  <!-- Medical device in hand -->
  <ellipse cx="190" cy="240" rx="15" ry="8" fill="#E8F4FD"/>
  <rect x="185" y="235" width="10" height="5" fill="#64B5F6"/>
  
  <!-- Friendly smile -->
  <path d="M142 152 Q150 157 158 152" stroke="#FF8A9B" stroke-width="2" fill="none"/>
  
  <!-- Scrub pocket -->
  <rect x="100" y="220" width="25" height="20" rx="3" fill="white" stroke="#FF9FD1" stroke-width="1"/>
  <circle cx="107" cy="225" r="2" fill="#FF6B9D"/>
  <circle cx="118" cy="230" r="2" fill="#FF6B9D"/>
  
  <!-- Name tag -->
  <rect x="170" y="200" width="35" height="25" rx="3" fill="white" stroke="#E91E63" stroke-width="1"/>
  <text x="187" y="210" text-anchor="middle" fill="#E91E63" font-size="6" font-family="Arial">Dr. Emma</text>
  <text x="187" y="218" text-anchor="middle" fill="#E91E63" font-size="6" font-family="Arial">Dermatology</text>
</svg>