<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#grad3)" rx="20"/>
  <circle cx="200" cy="120" r="60" fill="rgba(255,255,255,0.2)" filter="url(#blur3)"/>
  <circle cx="200" cy="120" r="40" fill="rgba(255,255,255,0.3)"/>
  <text x="200" y="200" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="600">Auto Editing</text>
  <text x="200" y="225" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="12">Pro Cuts & Transitions</text>
  <!-- Video timeline bars -->
  <rect x="120" y="110" width="60" height="20" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="190" y="110" width="40" height="20" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="240" y="110" width="50" height="20" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="120" y="135" width="45" height="20" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="175" y="135" width="55" height="20" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="240" y="135" width="35" height="20" rx="4" fill="rgba(255,255,255,0.4)"/>
  <!-- Sparkle effects -->
  <text x="320" y="100" fill="rgba(255,255,255,0.6)" font-size="20">✨</text>
  <text x="80" y="160" fill="rgba(255,255,255,0.5)" font-size="16">✨</text>
</svg>