<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="skin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C2A1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8B48F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hair1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F8FF;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bg1" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8E0F5;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg1)"/>
  
  <!-- Medical coat -->
  <path d="M75 200 Q75 180 90 170 L210 170 Q225 180 225 200 L225 400 L75 400 Z" fill="url(#coat1)" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- Neck -->
  <ellipse cx="150" cy="190" rx="25" ry="15" fill="url(#skin1)"/>
  
  <!-- Face -->
  <ellipse cx="150" cy="140" rx="45" ry="55" fill="url(#skin1)"/>
  
  <!-- Hair -->
  <path d="M105 120 Q105 80 150 75 Q195 80 195 120 Q195 110 185 105 Q170 100 150 100 Q130 100 115 105 Q105 110 105 120 Z" fill="url(#hair1)"/>
  
  <!-- Eyes -->
  <ellipse cx="135" cy="130" rx="8" ry="6" fill="white"/>
  <ellipse cx="165" cy="130" rx="8" ry="6" fill="white"/>
  <circle cx="135" cy="130" r="4" fill="#4A90A4"/>
  <circle cx="165" cy="130" r="4" fill="#4A90A4"/>
  <circle cx="136" cy="128" r="2" fill="black"/>
  <circle cx="166" cy="128" r="2" fill="black"/>
  <circle cx="137" cy="127" r="1" fill="white"/>
  <circle cx="167" cy="127" r="1" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M128 120 Q135 118 142 120" stroke="#654321" stroke-width="2" fill="none"/>
  <path d="M158 120 Q165 118 172 120" stroke="#654321" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <path d="M148 135 Q150 145 152 150" stroke="#D4A574" stroke-width="2" fill="none"/>
  
  <!-- Mouth -->
  <path d="M142 160 Q150 165 158 160" stroke="#C67B7B" stroke-width="3" fill="none"/>
  
  <!-- Stethoscope -->
  <circle cx="120" cy="220" r="8" fill="silver"/>
  <path d="M120 212 Q130 210 140 215 Q150 220 155 230" stroke="silver" stroke-width="3" fill="none"/>
  
  <!-- Collar -->
  <path d="M100 180 L120 200 L180 200 L200 180" stroke="#E0E0E0" stroke-width="2" fill="none"/>
  
  <!-- Professional badge -->
  <rect x="85" y="240" width="30" height="20" rx="5" fill="white" stroke="#1E40AF" stroke-width="1"/>
  <text x="100" y="252" text-anchor="middle" fill="#1E40AF" font-size="8" font-family="Arial">MD</text>
</svg>