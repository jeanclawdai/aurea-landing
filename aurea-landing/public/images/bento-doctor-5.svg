<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="skin5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C19660;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hair5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coat5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F8FF;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bg5" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#F5F1E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DCC6;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg5)"/>
  
  <!-- Luxury medical coat -->
  <path d="M75 195 Q75 175 90 165 L210 165 Q225 175 225 195 L225 400 L75 400 Z" fill="url(#coat5)" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- Elegant blouse underneath -->
  <path d="M130 165 Q150 175 170 165 L170 195 L130 195 Z" fill="#F0E6FF"/>
  
  <!-- Neck -->
  <ellipse cx="150" cy="185" rx="20" ry="10" fill="url(#skin5)"/>
  
  <!-- Face -->
  <ellipse cx="150" cy="135" rx="42" ry="50" fill="url(#skin5)"/>
  
  <!-- Hair in elegant bun -->
  <ellipse cx="150" cy="110" rx="48" ry="25" fill="url(#hair5)"/>
  <circle cx="150" cy="95" r="18" fill="url(#hair5)"/>
  <circle cx="150" cy="93" r="12" fill="#A0522D"/>
  
  <!-- Eyes (sophisticated) -->
  <ellipse cx="137" cy="127" rx="7" ry="5" fill="white"/>
  <ellipse cx="163" cy="127" rx="7" ry="5" fill="white"/>
  <circle cx="137" cy="127" r="3.5" fill="#654321"/>
  <circle cx="163" cy="127" r="3.5" fill="#654321"/>
  <circle cx="138" cy="125" r="1.5" fill="black"/>
  <circle cx="164" cy="125" r="1.5" fill="black"/>
  <circle cx="139" cy="124" r="0.8" fill="white"/>
  <circle cx="165" cy="124" r="0.8" fill="white"/>
  
  <!-- Defined eyebrows -->
  <path d="M130 119 Q137 117 144 119" stroke="#654321" stroke-width="2.5" fill="none"/>
  <path d="M156 119 Q163 117 170 119" stroke="#654321" stroke-width="2.5" fill="none"/>
  
  <!-- Nose -->
  <path d="M148 132 Q150 142 152 147" stroke="#B8945A" stroke-width="2" fill="none"/>
  
  <!-- Elegant lips -->
  <ellipse cx="150" cy="152" rx="9" ry="4" fill="#D2708C"/>
  <ellipse cx="150" cy="151" rx="7" ry="2" fill="#E08BA0"/>
  
  <!-- Professional expression -->
  <path d="M141 154 Q150 158 159 154" stroke="#B8626F" stroke-width="1" fill="none"/>
  
  <!-- Luxury stethoscope -->
  <circle cx="115" cy="225" r="9" fill="gold"/>
  <circle cx="115" cy="225" r="6" fill="#B8860B"/>
  <path d="M115 216 Q130 214 145 220 Q160 225 170 235" stroke="gold" stroke-width="3" fill="none"/>
  
  <!-- Designer coat details -->
  <path d="M90 165 L115 195 L145 165" stroke="#C0C0C0" stroke-width="2" fill="none"/>
  <path d="M210 165 L185 195 L155 165" stroke="#C0C0C0" stroke-width="2" fill="none"/>
  
  <!-- Elegant jewelry -->
  <circle cx="150" cy="175" r="3" fill="gold"/>
  <circle cx="150" cy="175" r="1.5" fill="#FFD700"/>
  
  <!-- Professional title plate -->
  <rect x="190" y="240" width="45" height="30" rx="5" fill="white" stroke="#8B4513" stroke-width="1"/>
  <text x="212" y="252" text-anchor="middle" fill="#8B4513" font-size="7" font-family="serif">Dr. Sophia</text>
  <text x="212" y="260" text-anchor="middle" fill="#8B4513" font-size="6" font-family="serif">Plastic Surgery</text>
  <text x="212" y="267" text-anchor="middle" fill="#8B4513" font-size="5" font-family="serif">Board Certified</text>
</svg>