<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="skin3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4B08A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hair3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2F2F2F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="beard3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5A5A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F3F3F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coat3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bg3" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#E6F3FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCE7FF;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg3)"/>
  
  <!-- Medical coat -->
  <path d="M70 200 Q70 180 85 170 L215 170 Q230 180 230 200 L230 400 L70 400 Z" fill="url(#coat3)" stroke="#E0E0E0" stroke-width="2"/>
  
  <!-- Shirt/Tie -->
  <rect x="140" y="170" width="20" height="60" fill="#1E40AF"/>
  <path d="M135 170 L150 180 L165 170 L165 190 L135 190 Z" fill="white"/>
  
  <!-- Neck -->
  <ellipse cx="150" cy="190" rx="22" ry="12" fill="url(#skin3)"/>
  
  <!-- Face -->
  <ellipse cx="150" cy="140" rx="45" ry="55" fill="url(#skin3)"/>
  
  <!-- Hair (short professional) -->
  <path d="M105 120 Q105 80 150 75 Q195 80 195 120 Q195 110 180 105 Q165 102 150 102 Q135 102 120 105 Q105 110 105 120 Z" fill="url(#hair3)"/>
  
  <!-- Beard -->
  <path d="M125 155 Q150 175 175 155 Q175 165 150 170 Q125 165 125 155" fill="url(#beard3)"/>
  
  <!-- Eyes -->
  <ellipse cx="135" cy="130" rx="8" ry="6" fill="white"/>
  <ellipse cx="165" cy="130" rx="8" ry="6" fill="white"/>
  <circle cx="135" cy="130" r="4" fill="#2D5016"/>
  <circle cx="165" cy="130" r="4" fill="#2D5016"/>
  <circle cx="136" cy="128" r="2" fill="black"/>
  <circle cx="166" cy="128" r="2" fill="black"/>
  <circle cx="137" cy="127" r="1" fill="white"/>
  <circle cx="167" cy="127" r="1" fill="white"/>
  
  <!-- Eyebrows (thicker, masculine) -->
  <path d="M126 118 Q135 116 144 118" stroke="#4A4A4A" stroke-width="3" fill="none"/>
  <path d="M156 118 Q165 116 174 118" stroke="#4A4A4A" stroke-width="3" fill="none"/>
  
  <!-- Nose -->
  <path d="M148 135 Q150 145 152 150" stroke="#C9A876" stroke-width="2" fill="none"/>
  
  <!-- Mouth (under beard) -->
  <path d="M140 158 Q150 162 160 158" stroke="#A67C52" stroke-width="2" fill="none"/>
  
  <!-- Stethoscope -->
  <circle cx="110" cy="230" r="10" fill="silver"/>
  <path d="M110 220 Q125 218 140 225 Q155 230 165 240" stroke="silver" stroke-width="3" fill="none"/>
  
  <!-- Coat lapels -->
  <path d="M85 170 L110 200 L140 170" stroke="#D0D0D0" stroke-width="2" fill="none"/>
  <path d="M215 170 L190 200 L160 170" stroke="#D0D0D0" stroke-width="2" fill="none"/>
  
  <!-- Medical device in pocket -->
  <rect x="200" y="220" width="20" height="8" rx="2" fill="#3B82F6"/>
  <circle cx="205" r="2" cy="224" fill="white"/>
  
  <!-- Professional badge -->
  <rect x="80" y="250" width="40" height="25" rx="5" fill="white" stroke="#1E40AF" stroke-width="1"/>
  <text x="100" y="260" text-anchor="middle" fill="#1E40AF" font-size="7" font-family="Arial">Dr. Michael</text>
  <text x="100" y="268" text-anchor="middle" fill="#1E40AF" font-size="7" font-family="Arial">Surgeon</text>
</svg>