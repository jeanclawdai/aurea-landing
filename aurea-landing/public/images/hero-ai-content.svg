<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#grad1)" rx="20"/>
  <circle cx="200" cy="120" r="60" fill="rgba(255,255,255,0.2)" filter="url(#blur)"/>
  <circle cx="200" cy="120" r="40" fill="rgba(255,255,255,0.3)"/>
  <text x="200" y="200" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="600">AI Content</text>
  <text x="200" y="225" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="12">Smart Generation</text>
  <!-- Neural network nodes -->
  <circle cx="140" cy="140" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="260" cy="140" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="170" cy="90" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="230" cy="90" r="8" fill="rgba(255,255,255,0.6)"/>
  <line x1="170" y1="90" x2="200" y2="120" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="230" y1="90" x2="200" y2="120" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="140" y1="140" x2="200" y2="120" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="260" y1="140" x2="200" y2="120" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
</svg>