<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="blur4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#grad4)" rx="20"/>
  <circle cx="200" cy="120" r="60" fill="rgba(255,255,255,0.2)" filter="url(#blur4)"/>
  <circle cx="200" cy="120" r="40" fill="rgba(255,255,255,0.3)"/>
  <text x="200" y="200" text-anchor="middle" fill="white" font-family="system-ui" font-size="16" font-weight="600">Smart Posting</text>
  <text x="200" y="225" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui" font-size="12">Optimal Timing</text>
  <!-- Calendar grid -->
  <rect x="150" y="100" width="100" height="80" rx="8" fill="rgba(255,255,255,0.2)"/>
  <rect x="160" y="90" width="80" height="15" rx="4" fill="rgba(255,255,255,0.4)"/>
  <!-- Grid squares -->
  <rect x="160" y="115" width="18" height="18" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="185" y="115" width="18" height="18" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="210" y="115" width="18" height="18" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="235" y="115" width="18" height="18" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="160" y="140" width="18" height="18" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="185" y="140" width="18" height="18" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="210" y="140" width="18" height="18" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="235" y="140" width="18" height="18" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Social icons -->
  <circle cx="130" cy="130" r="12" fill="rgba(255,255,255,0.5)"/>
  <circle cx="270" cy="130" r="12" fill="rgba(255,255,255,0.5)"/>
</svg>